[[permission]]
identifier = "gsc-devices"
description = "Enumerate audio output, MIDI, and serial devices; send MIDI, OSC, and DMX"
commands.allow = [
  "list_audio_output_devices",
  "list_midi_ports",
  "send_midi",
  "send_dmx",
  "list_serial_ports",
  "connect_enttec_pro",
  "disconnect_enttec_pro",
  "is_enttec_pro_connected",
  "send_enttec_pro_dmx",
  "send_osc",
  "list_midi_input_ports",
  "start_midi_input",
  "stop_midi_input",
  "ndi_is_available",
  "list_ndi_sources",
  "start_ndi_output",
  "stop_ndi_output",
  "get_ndi_output_status",
  "push_ndi_frame",
]
