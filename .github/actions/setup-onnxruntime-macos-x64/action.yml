name: Setup ONNX Runtime (macOS x86_64)
description: >
  Download Microsoft ONNX Runtime for Intel Mac and configure ort-sys to
  dynamic-link it (pyke no longer ships x86_64-apple-darwin prebuilts).
  Writes src-tauri/.cargo/config.toml so Cargo/tauri-action always see the
  env vars, and exports ORT_LIB_LOCATION for the post-build bundle script.
outputs:
  lib_location:
    description: Absolute path to the ONNX Runtime lib directory
    value: ${{ steps.download.outputs.lib_location }}
runs:
  using: composite
  steps:
    - name: Download ONNX Runtime for macOS x86_64
      id: download
      shell: bash
      run: |
        set -euo pipefail
        ORT_VERSION="1.23.2"
        EXTRACT_ROOT="${RUNNER_TEMP}/onnxruntime"
        # macOS bsdtar does not honor --strip-components on this Microsoft archive,
        # so keep the versioned top-level directory from the tarball.
        LIB_DIR="${EXTRACT_ROOT}/onnxruntime-osx-x86_64-${ORT_VERSION}/lib"

        echo "Downloading ONNX Runtime ${ORT_VERSION} for macOS x86_64..."
        curl -fsSL -o /tmp/onnxruntime.tgz \
          "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-x86_64-${ORT_VERSION}.tgz"
        file /tmp/onnxruntime.tgz
        ls -lh /tmp/onnxruntime.tgz

        rm -rf "${EXTRACT_ROOT}"
        mkdir -p "${EXTRACT_ROOT}"
        tar xzf /tmp/onnxruntime.tgz -C "${EXTRACT_ROOT}"

        if [[ ! -e "${LIB_DIR}/libonnxruntime.dylib" ]]; then
          echo "Expected ${LIB_DIR}/libonnxruntime.dylib after extract" >&2
          find "${EXTRACT_ROOT}" -maxdepth 4 -print >&2 || true
          exit 1
        fi

        echo "Using ORT lib dir: ${LIB_DIR}"
        echo "lib_location=${LIB_DIR}" >> "$GITHUB_OUTPUT"
        echo "ORT_LIB_LOCATION=${LIB_DIR}" >> "$GITHUB_ENV"
        echo "ORT_LIB_PATH=${LIB_DIR}" >> "$GITHUB_ENV"
        echo "ORT_PREFER_DYNAMIC_LINK=1" >> "$GITHUB_ENV"

        # Cargo [env] is visible to build scripts even if a later action does not
        # forward process env (more reliable than GITHUB_ENV alone).
        mkdir -p src-tauri/.cargo
        CONFIG_PATH="src-tauri/.cargo/config.toml"
        {
          echo "# Generated by setup-onnxruntime-macos-x64 for Intel Mac CI builds."
          echo "# ort-sys has no pyke prebuilts for x86_64-apple-darwin."
          echo "[env]"
          echo "ORT_LIB_LOCATION = { value = \"${LIB_DIR}\", force = true }"
          echo "ORT_LIB_PATH = { value = \"${LIB_DIR}\", force = true }"
          echo "ORT_PREFER_DYNAMIC_LINK = { value = \"1\", force = true }"
          echo ""
          echo "[target.x86_64-apple-darwin]"
          echo 'rustflags = ["-C", "link-arg=-Wl,-rpath,@executable_path/../Frameworks"]'
        } > "${CONFIG_PATH}"

        echo "=== ONNX Runtime ${ORT_VERSION} ==="
        ls -la "${LIB_DIR}/"
        echo "=== ${CONFIG_PATH} ==="
        cat "${CONFIG_PATH}"
