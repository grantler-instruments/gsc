name: Release Tauri

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Install Playwright
        run: npm run test:e2e:install -- --with-deps

      - name: Web E2E tests
        run: npm run test:e2e

      - name: Desktop E2E (Tauri WebDriver)
        uses: ./.github/actions/desktop-e2e

  release:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            imagemagick \
            patchelf \
            libasound2-dev \
            libudev-dev

      - run: npm ci

      - name: Set version from git tag
        run: node scripts/sync-version.mjs "${{ github.ref_name }}"

      - name: Install ImageMagick (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install imagemagick

      - name: Install ImageMagick (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install imagemagick --yes

      # macOS signing/notarization disabled on CI for now (both aarch64 and x86_64).
      # Re-enable: https://v2.tauri.app/distribute/sign/macos/

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use CI-safe DMG creation (no Finder AppleScript). Required on GHA macOS runners.
          TAURI_BUNDLER_DMG_IGNORE_CI: false
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Grantler Stage Control ${{ github.ref_name }}
          releaseBody: Desktop builds for Windows, macOS, and Linux.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
