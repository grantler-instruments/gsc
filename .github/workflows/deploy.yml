name: Deploy to GitHub Pages

# Push-to-main deploys are gated by the CI workflow's result (no duplicate test
# run). Manual runs (workflow_dispatch) still run the full gate themselves.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    if: >-
      ${{ always() && (
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'workflow_dispatch' && needs.test.result == 'success')
      ) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Restore Pages site cache
        uses: actions/cache/restore@v4
        with:
          path: site
          key: pages-site-${{ github.run_id }}
          restore-keys: pages-site-

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      # Project Pages URL: grantler-instruments.github.io/gsc/
      - name: Build for GitHub Pages
        run: npm run build:pages
        env:
          VITE_BASE: /gsc/

      - name: Merge stable build into site
        run: |
          mkdir -p site
          rsync -a dist/ site/

      - name: Save Pages site cache
        uses: actions/cache/save@v4
        with:
          path: site
          key: pages-site-${{ github.run_id }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
