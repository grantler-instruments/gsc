<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e2229" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="GSC" />
    <title>Grantler Stage Control</title>
    <script>
      (() => {
        const syncViewport = () => {
          const root = document.documentElement;
          root.style.setProperty("--app-vh", `${window.innerHeight}px`);
          root.style.setProperty("--app-vw", `${window.innerWidth}px`);
        };
        syncViewport();
        window.addEventListener("resize", syncViewport);
      })();
      (() => {
        var c = globalThis.crypto;
        var bytes;
        var hex;
        if (!c || typeof c.randomUUID === "function") return;
        c.randomUUID = () => {
          if (typeof c.getRandomValues === "function") {
            bytes = new Uint8Array(16);
            c.getRandomValues(bytes);
            bytes[6] = (bytes[6] & 15) | 64;
            bytes[8] = (bytes[8] & 63) | 128;
            hex = Array.from(bytes, (b) => b.toString(16).padStart(2, "0")).join("");
            return (
              hex.slice(0, 8) +
              "-" +
              hex.slice(8, 12) +
              "-" +
              hex.slice(12, 16) +
              "-" +
              hex.slice(16, 20) +
              "-" +
              hex.slice(20)
            );
          }
          return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (ch) => {
            var n = (Math.random() * 16) | 0;
            return (ch === "x" ? n : (n & 3) | 8).toString(16);
          });
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
